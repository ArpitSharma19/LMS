<style>
        /* Base styles to ensure consistency */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Subtle pulsing animation for skeleton/loading states */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;

<body class="bg-surface min-h-screen flex items-center justify-center p-md relative overflow-hidden text-on-surface">
<!-- Premium Abstract Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center opacity-30">
<img aria-hidden="true" class="min-w-full min-h-full object-cover blur-3xl opacity-60" data-alt="A sophisticated, abstract 3D rendered background designed for a modern corporate SaaS platform. The scene features smooth, flowing geometric planes and soft, wave-like structures in pale blue and crisp white tones. It is illuminated by diffused, high-key studio lighting that creates a bright, airy light-mode aesthetic. Subtle glassmorphic elements and soft gradients add depth without distraction, embodying an atmosphere of intelligence, clarity, and forward momentum. The overall palette is minimal, relying on pristine whites and very soft, ambient shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoitNWatEe-xg5vdIzS3q89MZlavGSyCnuzZ6XwOrd2XVLZ_s7BjD0UDnQUtHiywHm_nZ-H9rElhihB_nLRAtCNoRUOjCKg-6K2LlSwI6uUAjX8_ed3DfeMzxctNTknr5YD-WJZAFcFkGDTj5mfbUP3sfFZg8Z-VQ0GidFoooXXXvd4TqeYeNwUF-0GssTbDaW2m4GtVXO4G40fe3D8xk3h0s50vtuCea60RgUm84nEaFVhc96dYnOtaZLhHJCiFCrF94bEgp2iR0"/>
</div>
<!-- Main Card Container -->
<main class="relative z-10 w-full max-w-[420px] bg-surface-container-lowest rounded-xl border border-outline-variant p-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.05),0_4px_6px_-2px_rgba(0,0,0,0.025)] flex flex-col gap-xl">
<!-- Header / Brand -->
<header class="flex flex-col items-center text-center">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">
                    school
                </span>
<span class="font-h4 text-h4 text-on-surface tracking-tight">BrainLyft</span>
</div>
<h1 class="font-h3 text-xl font-semibold text-on-surface mb-sm">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to your account to continue learning.</p>
</header>
<!-- Login Form -->
<form action="/api/auth/login" class="flex flex-col gap-lg" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface" for="email">Email Address</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">
                        mail
                    </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[44px] pr-md py-[12px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-[3px] focus:ring-primary-fixed transition-shadow" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant transition-colors font-medium" href="#">Forgot password?</a>
</div>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">
                        lock
                    </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-[44px] pr-md py-[12px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-[3px] focus:ring-primary-fixed transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button (Primary) -->
<!-- Note: Includes a subtle inner highlight via box-shadow for a premium tactile feel as requested in docs -->
<button class="w-full bg-primary text-on-primary rounded-lg py-[12px] px-md font-body-md text-body-md font-medium flex items-center justify-center gap-sm hover:bg-on-primary-fixed-variant transition-colors shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] mt-sm group" type="submit">
                Log in
                <span aria-hidden="true" class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">
                    arrow_forward
                </span>
</button>
<!-- Hidden Loading State Example (for demonstration of structure) -->
<!-- 
            <button type="button" disabled class="w-full bg-primary/70 text-on-primary rounded-lg py-[12px] px-md font-body-md text-body-md font-medium flex items-center justify-center gap-sm cursor-not-allowed mt-sm">
                <span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>
                Logging in...
            </button>
            -->
</form>
<!-- Registration Link -->
<div class="mt-xs text-center border-t border-surface-variant pt-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-medium hover:text-on-primary-fixed-variant transition-colors" href="#">Register here</a>
</p>
</div>
